<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="app.js" defer></script>
    <title>Isabelle's CV</title>
</head>
<body data-page="cv">
    <div id="scroll-progress" aria-hidden="true"></div>
    <div id="cursor-glow" aria-hidden="true"></div>
    <header>
        <button id="themeButton" aria-label="Toggle Dark Mode">🌘</button>
        <nav>
            <ul id="nav-list"></ul>
        </nav>
    </header>
    <main>
        <div class="carousel" id="carousel"></div>
        <div class="isabelle-CV">
            <section class="intro-section" data-reveal="left">
                <div class="cont1">
                    <div class="text">
                        <h2 id="intro-heading"></h2>
                        <div id="intro-paragraphs"></div>
                        <p><strong>Language spoken:</strong> <span id="intro-languages"></span></p>
                        <p><strong>Education:</strong> <span id="intro-education"></span></p>
                        <div class="links" id="intro-links"></div>
                    </div>
                </div>
                <!-- CHANGE: Replaced plain photo with a work-lanyard structure. The strap + card get id="lanyard" so app.js can swing it left/right on scroll. -->
                <div class="lanyard-wrapper" id="lanyard">
                    <div class="lanyard-clip" aria-hidden="true"></div>
                    <div class="lanyard-strap" aria-hidden="true"></div>
                    <div class="lanyard-ring" aria-hidden="true"></div>
                    <div class="photo lanyard-card" data-tilt>
                        <img src="assets/image/IMG_4132.JPG" alt="Isabelle's photo">
                        <div class="lanyard-meta">
                            <span class="lanyard-label">STAFF</span>
                            <span class="lanyard-name">Isabelle</span>
                            <span class="lanyard-role">Backend Developer</span>
                        </div>
                    </div>
                </div>
            </section>
            <section id="skills" class="skills-section" data-reveal="up">
                <h2 id="skills-heading"></h2>
                <div class="container" id="skills-items" data-reveal-group data-tilt-group></div>
            </section>
            <section id="experience" class="experience-section" data-reveal="up">
                <h2 id="experience-heading"></h2>
                <div id="experience-items"></div>
            </section>
            <section id="contact" class="contact-section" data-reveal="up">
                <h2 id="contact-heading"></h2>
                <!-- CHANGE: Rebuilt the contact section as a two-column grid: form fields inline on the left, live comments guestbook on the right. -->
                <div class="contact-grid">
                    <div class="contact-form-col">
                        <p id="contact-description"></p>
                        <form id="contact-form">
                            <!-- CHANGE: name / email / message are now on ONE inline row (see .form-row in style.css). -->
                            <div class="form-row">
                                <div class="form-field">
                                    <label for="name" id="label-name">Name</label>
                                    <input type="text" id="name" required>
                                </div>
                                <div class="form-field">
                                    <label for="email" id="label-email">Email</label>
                                    <input type="email" id="email" required>
                                </div>
                                <div class="form-field form-field--grow">
                                    <label for="message" id="label-message">Message</label>
                                    <input type="text" id="message" required>
                                </div>
                            </div>
                            <button type="submit" id="contact-button"></button>
                        </form>
                    </div>
                    <!-- CHANGE: New comments column so visitors can see what other people have written. -->
                    <aside class="comments-col" aria-label="Visitor comments">
                        <h3>What visitors are saying</h3>
                        <div class="comments-scroll" id="comments-list"></div>
                        <form class="add-comment" id="add-comment-form">
                            <input type="text" id="comment-input" placeholder="Leave a quick note…" required>
                            <button type="submit">Post</button>
                        </form>
                    </aside>
                </div>
            </section>
        </div>
    </main>
    <footer>
        <p id="footer-text"></p>
        <nav>
            <ul id="footer-nav"></ul>
        </nav>
    </footer>
    <button id="backToTop" aria-label="Back to top">↑</button>
</body>
</html>
