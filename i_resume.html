<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="app.js" defer></script>
    <title>Isabelle's CV</title>
</head>
<body data-page="i_resume">
    <header>
        <button id="themeButton" aria-label="Toggle Dark Mode">🌘</button>
        <nav>
            <ul id="nav-list"></ul>
        </nav>
    </header>
    <main>
        <div class="carousel" id="carousel"></div>
        <div class="isabelle-CV">
            <section class="intro-section">
                <div class="cont1">
                    <div class="text">
                        <h2 id="intro-heading"></h2>
                        <div id="intro-paragraphs"></div>
                        <p><strong>Language spoken:</strong> <span id="intro-languages"></span></p>
                        <p><strong>Education:</strong> <span id="intro-education"></span></p>
                        <div class="links" id="intro-links"></div>
                    </div>
                </div>
                <div class="photo">
                    <img src="assets/image/IMG_4132.JPG" alt="Isabelle's photo">
                </div>
            </section>
            <section id="skills" class="skills-section">
                <h2 id="skills-heading"></h2>
                <div class="container" id="skills-items"></div>
            </section>
            <section id="experience" class="experience-section">
                <h2 id="experience-heading"></h2>
                <div id="experience-items"></div>
            </section>
            <section id="contact" class="contact-section">
                <h2 id="contact-heading"></h2>
                <div class="info">
                    <div class="text">
                        <p id="contact-description"></p>
                    </div>
                    <form>
                        <label for="name" id="label-name">Name</label>
                        <input type="text" id="name">
                        <label for="email" id="label-email">Email</label>
                        <input type="email" id="email">
                        <label for="message" id="label-message">Message</label>
                        <textarea id="message" cols="30" rows="20"></textarea>
                        <button type="submit" id="contact-button"></button>
                    </form>
                </div>
            </section>
        </div>
    </main>
    <footer>
        <p id="footer-text"></p>
        <nav>
            <ul id="footer-nav"></ul>
        </nav>
    </footer>
</body>
</html>
