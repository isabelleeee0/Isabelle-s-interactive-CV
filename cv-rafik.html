<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuoFolio - Rafik's CV</title>
    <link rel="stylesheet" href="assets/style.css">
    <script src="app.js" defer></script>
</head>
<body data-page="cv_rafik">
    <header>
        <button id="themeButton" aria-label="Toggle Dark Mode">🌘</button>
        <nav>
            <ul id="nav-list"></ul>
        </nav>
    </header>
    <main id="cv">
        <section id="hero">
            <h1 id="hero-title"></h1>
            <img id="hero-image" src="" alt="" width="100" height="100">
            <p id="hero-description"></p>
        </section>
        <section id="personal-information">
            <h2 id="personal-heading"></h2>
            <ul id="personal-items"></ul>
        </section>
        <section id="education">
            <h2 id="education-heading"></h2>
            <ul id="education-items"></ul>
        </section>
        <section id="skills">
            <h2 id="skills-heading"></h2>
            <ul id="skills-items"></ul>
        </section>
        <section id="experience">
            <h2 id="experience-heading"></h2>
            <ul id="experience-items"></ul>
        </section>
        <section id="languages">
            <h2 id="languages-heading"></h2>
            <ul id="languages-items"></ul>
        </section>
        <section id="offers">
            <h2 id="offers-heading"></h2>
            <ul id="offers-items"></ul>
        </section>
        <section id="contact">
            <h2 id="contact-heading"></h2>
            <p id="contact-description"></p>
            <ul id="contact-items"></ul>
        </section>
    </main>
    <footer>
        <p id="footer-text"></p>
        <nav>
            <ul id="footer-nav"></ul>
        </nav>
    </footer>
</body>
</html>
