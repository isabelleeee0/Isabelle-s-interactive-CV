<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- The shared app.js powers both pages -->
    <script src="app.js" defer></script>
    <title>Isabelle Yip | Portfolio</title>
</head>
<body data-page="index">

    <!-- THE LANDING PAGE OVERLAY -->
    <div id="landing-overlay">
        <canvas id="vortex-canvas"></canvas>
        <div class="landing-content">
            <div class="landing-eyebrow" data-intro>System Initialization</div>
            <h1 class="landing-name" data-intro>- Isabelle Yip -</h1>
            <div class="landing-tagline" data-intro>Interactive Portfolio</div>
            <div class="countdown" id="countdown"></div>
            <div class="landing-status" id="landingStatus"></div>
        </div>
        <button class="skip-btn" id="skipIntro">Skip Intro</button>
    </div>

    <!-- GLOBAL UI ELEMENTS -->
    <div id="scroll-progress" aria-hidden="true"></div>
    <div id="cursor-glow" aria-hidden="true"></div>

    <header>
        <button id="themeButton" aria-label="Toggle Dark Mode">🌘</button>
        <nav>
            <ul id="nav-list"></ul>
        </nav>
    </header>

    <main>
        <!-- HERO SECTION -->
        <section id="hero" data-reveal="up">
            <div class="hero-media">
                <div class="hero-media-veil"></div>
                <video id="hero-video" autoplay loop muted playsinline>
                    <!-- Update with your actual video asset path -->
                    <source src="assets/video/bg-video.mp4" type="video/mp4">
                </video>
            </div>
            <div class="hero-content">
                <span class="hero-eyebrow">Welcome</span>
                <h1 id="hero-title"></h1>
                <p id="hero-description"></p>
            </div>
            <div class="scroll-cue">
                <div class="scroll-cue-mouse">
                    <div class="scroll-cue-dot"></div>
                </div>
            </div>
        </section>

        <!-- ABOUT SECTION -->
        <!-- CHANGE: Added an interactive constellation canvas + magnetic hover playground the visitor can play with. -->
        <!-- ABOUT SECTION: Replaces the old interactive canvas with a static, tech-themed terminal -->

        <section id="about" data-reveal="up">
            <h2 id="about-heading"></h2>
            <div id="about-paragraphs"></div>
        </section>
               

        <!-- TEAM SECTION -->
        <section id="our-team" data-reveal="up">
            <h2 id="our-team-heading"></h2>
            <div class="team-grid" id="team-grid" data-reveal-group></div>
        </section>

        <!-- BACKGROUND STARS ANIMATION -->
        <div class="stars" id="stars-container" aria-hidden="true"></div>
    </main>

    <footer>
        <p id="footer-text"></p>
        <nav>
            <ul id="footer-nav"></ul>
        </nav>
    </footer>

    <button id="backToTop" aria-label="Back to top">↑</button>

</body>
</html>
