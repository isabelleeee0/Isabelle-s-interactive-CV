<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isabelle Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body data-page="index">
    <header>
        <button id="themeButton" aria-label="Toggle Dark Mode">🌘</button>
        <nav>
            <ul id="nav-list"></ul>
        </nav>
    </header>
    <main>
        <section id="hero">
            <video autoplay muted loop playsinline id="hero-video">
                <source src="assets/image/vecteezy_chatting-between-two-person-men-and-woman-animated-footage_46286512.mp4" type="video/mp4">
            </video>
            <div class="hero-content">
                <h1 id="hero-title"></h1>
                <p id="hero-description"></p>
            </div>
        </section>
        <section id="about">
            <h2 id="about-heading"></h2>
            <div id="about-paragraphs"></div>
        </section>
        <section id="our-team">
            <h2 id="our-team-heading"></h2>
            <div class="team-grid" id="team-grid"></div>
        </section>
        <section id="background-animation">
            <div class="stars" id="stars-container"></div>
        </section>
    </main>
    <footer>
        <p id="footer-text"></p>
        <nav>
            <ul id="footer-nav"></ul>
        </nav>
        <p><span id="current-date"></span></p>
    </footer>
</body>
</html>
